name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install compiler
        run: python -m pip install -e .[dev]
      - name: Fetch plan-orchestrator for contract round-trip
        run: |
          if [ ! -f ../plan-orchestrator/automation/run_plan_orchestrator.py ]; then
            git clone --depth 1 https://github.com/AysajanE/plan-orchestrator.git ../plan-orchestrator
          fi
      - name: Run compiler tests
        env:
          PLAN_ORCHESTRATOR_CLEAN_ENV_CONFIRMED: "1"
        run: python -m unittest discover -s automation/gstack_to_markdown_playbook_v1/tests -p 'test_*.py'
